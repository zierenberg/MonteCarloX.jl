name: CI examples
on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  examples:
    name: Examples - Julia 1 - ubuntu-latest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop([
              PackageSpec(path=pwd()),
              PackageSpec(path="SpinSystems"),
            ])
            Pkg.instantiate()
          '
      - name: Run smoke tests
        env:
          MCX_CI: "true"
          MCX_CI_LOOP_CAP: "2000"
        run: julia --project=docs docs/src/examples/runtests.jl